<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Django</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!-- FontAwesome Icons -->
    <script src="https://kit.fontawesome.com/15585ca68f.js" crossorigin="anonymous"></script>
{% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(
                to right,
                rgba(15, 23, 42, 0.9),
                rgba(15, 23, 42, 0.7)
            ),
            url('{% static '459-background.png' %}');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            max-width: none;
        }

        .form-box {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 48, 73, 0.2);
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: transform 0.3s ease-in-out;
        }

        .form-box:hover {
            transform: translateY(-5px);
        }

        .form-box h1 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #003049;
            position: relative;
            font-weight: 700;
        }

        .form-box h1::after {
            content: '';
            width: 50px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, #003049, #008F8C);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s ease;
        }

        .input-group:hover {
            transform: translateX(5px);
        }

        .input-group .input-group-text {
            background: #003049;
            color: white;
            border: none;
            width: 45px;
            justify-content: center;
        }

        .input-group .input-group-prepend {
            margin-right: -1px;
        }

        .form-control {
            height: 50px;
            font-size: 15px;
            border: 1px solid #0E6B6B;
            border-left: none;
            padding-left: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #008F8C;
        }

        .btn-primary {
            background: linear-gradient(to right, #003049, #008F8C);
            border: none;
            font-size: 16px;
            font-weight: 600;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #00405E, #00B2AE);
            box-shadow: 0 5px 15px rgba(0, 48, 73, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .text-muted {
            color: #0E6B6B !important;
            margin-top: 20px;
            font-size: 14px;
        }

        .text-muted a {
            color: #003049;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .text-muted a:hover {
            color: #008F8C;
        }

        .text-danger {
            color: #ef4444 !important;
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* Responsive Adjustments */
        @media (max-width: 576px) {
            .form-box {
                padding: 30px 20px;
            }

            .form-box h1 {
                font-size: 24px;
            }

            .btn-primary {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-box">
        <h1>Login</h1>
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                </div>
                <input type="text" name="username" placeholder="Username" class="form-control" required>
            </div>

            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                </div>
                <input type="password" name="password" placeholder="Password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>

            {% if messages %}
            <div class="text-danger mt-2">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
            {% endif %}

            <p class="text-muted mt-3">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
        </form>
    </div>
</div>

<!-- jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

</body>
</html>
